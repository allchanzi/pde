[window]
padding = { x = 10, y = 10 }
option_as_alt = "Both"
title = "Alacritty"
dynamic_title = true

[font]
size = 13.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[env]
TERM = "xterm-256color"

[general]
live_config_reload = true
import = ["~/.config/alacritty/theme.toml"]

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
