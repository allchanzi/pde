# Font
font_family      Terminess Nerd Font
font_size        13.0

# Window
window_padding_width 10

# Use Option as Alt (same as Alacritty option_as_alt = "Both")
macos_option_as_alt yes

# Better TERM for nvim (undercurl, true color)
term xterm-kitty
copy_on_select yes

# ── Windows & splits (nvim-style, cross-platform) ─────────────────────────
# All bindings use kitty_mod (default: ctrl+shift) so they behave identically
# on macOS, Linux and Windows and never clash with nvim's own ctrl+hjkl.
enabled_layouts splits,stack

# Create splits — mnemonic matches the divider shape:
#   -  → horizontal divider → windows stacked   (nvim :split  / <leader>sh)
#   \  (| ) → vertical divider → side by side     (nvim :vsplit / <leader>sv)
map kitty_mod+minus     launch --location=hsplit --cwd=current
map kitty_mod+backslash launch --location=vsplit --cwd=current

# Navigate between windows — hjkl, same directions as nvim ctrl+hjkl
map kitty_mod+h neighboring_window left
map kitty_mod+j neighboring_window bottom
map kitty_mod+k neighboring_window top
map kitty_mod+l neighboring_window right

# Move / swap the focused window in the layout
map ctrl+alt+h move_window left
map ctrl+alt+j move_window bottom
map ctrl+alt+k move_window top
map ctrl+alt+l move_window right

# Resize the focused window (add alt to the nav keys)
map kitty_mod+alt+h resize_window narrower
map kitty_mod+alt+l resize_window wider
map kitty_mod+alt+k resize_window taller
map kitty_mod+alt+j resize_window shorter
map kitty_mod+alt+0 resize_window reset

# Zoom / un-zoom the focused window (like tmux prefix-z)
map kitty_mod+z toggle_layout stack

# Close the focused window (nvim <leader>q)
map kitty_mod+q close_window

# Disable audio bell
enable_audio_bell no

# Tab bar (hidden — using tmux instead)
tab_bar_style hidden

# macOS tab navigation for terminal app tabs
map cmd+[ previous_tab
map cmd+] next_tab
map cmd+n new_tab
map cmd+w close_tab

# macOS title bar
hide_window_decorations titlebar-only

# Colors — generated by bin/theme
include theme.conf
