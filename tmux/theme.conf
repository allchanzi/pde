# Pane borders
set -g pane-border-style "fg=#16161e"
set -g pane-active-border-style "fg=#7aa2f7"

# Messages
set -g message-style "bg=#16161e,fg=#c0caf5"
set -g message-command-style "bg=#16161e,fg=#7aa2f7"

# Status bar
set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g status-position bottom
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 140

# Left: session name
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#1a1b26]"

# Windows
setw -g window-status-separator ""
setw -g window-status-format "#[fg=#565f89,bg=#1a1b26]  #W "
setw -g window-status-current-format "#[fg=#1a1b26,bg=#bb9af7,bold]  #W #[fg=#bb9af7,bg=#1a1b26]"

# Right: git branch | date | time
set -g status-right "#[fg=#292e42,bg=#1a1b26]#[fg=#565f89,bg=#292e42]  #(cd '#{pane_current_path}' 2>/dev/null && git branch --show-current 2>/dev/null) #[fg=#16161e,bg=#292e42]#[fg=#c0caf5,bg=#16161e]  %d.%m.%Y #[fg=#7aa2f7,bg=#16161e]#[fg=#1a1b26,bg=#7aa2f7,bold]  %H:%M "
