# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# Messages
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#89b4fa"

# Status bar
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-position bottom
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 140

# Left: session name
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[fg=#89b4fa,bg=#1e1e2e]"

# Windows
setw -g window-status-separator ""
setw -g window-status-format "#[fg=#6c7086,bg=#1e1e2e]  #W "
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#f5c2e7,bold]  #W #[fg=#f5c2e7,bg=#1e1e2e]"

# Right: git branch | date | time
set -g status-right "#[fg=#45475a,bg=#1e1e2e]#[fg=#6c7086,bg=#45475a]  #(cd '#{pane_current_path}' 2>/dev/null && git branch --show-current 2>/dev/null) #[fg=#313244,bg=#45475a]#[fg=#cdd6f4,bg=#313244]  %d.%m.%Y #[fg=#89b4fa,bg=#313244]#[fg=#1e1e2e,bg=#89b4fa,bold]  %H:%M "
