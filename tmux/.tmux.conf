# Use Ctrl-a as prefix instead of Ctrl-b
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Let tmux update the terminal window/tab title
set -g set-titles on
set -g set-titles-string "#S:#W"

# Start numbering from 1 (not 0)
set -g base-index 1
setw -g pane-base-index 1

# Enable mouse
set -g mouse on

# Faster escape
set -sg escape-time 10

# Split shortcuts
bind | split-window -h
bind - split-window -v

# Reload config shortcut
bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"

# Open selected file path from terminal output in the Neovim pane
bind o run-shell "tmux-open-in-nvim"

# Vim-style navigation
setw -g mode-keys vi

# Detach safely
bind d detach

# Kill current window
bind x kill-window

# Save Neovim buffers in all panes, then kill the whole session
bind X confirm-before -p "Save and kill tmux session? (y/n)" "run-shell 'tmux list-panes -a -F \"#{session_name}:#{window_index}.#{pane_index} #{pane_current_command}\" | while read pane cmd; do if [ \"$cmd\" = \"nvim\" ]; then tmux send-keys -t \"$pane\" C-\\\\ C-n Escape \":wa\" Enter; fi; done; sleep 0.2; tmux kill-session'"

# Move between panes using Alt + WASD
bind -n M-a select-pane -L
bind -n M-d select-pane -R
bind -n M-w select-pane -U
bind -n M-s select-pane -D

# Resize panes with prefix + WASD
bind a resize-pane -L 5
bind d resize-pane -R 5
bind w resize-pane -U 3
bind s resize-pane -D 3

# Switch tmux windows (layouts) using Alt + number
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7

bind -n M-Left previous-window
bind -n M-Right next-window
# Create a system/process/network snapshot and copy it to clipboard for AI
bind P run-shell "ai-system-snapshot >/dev/null 2>&1" \; display-message "System snapshot copied to clipboard"

# Shared theme generated by bin/theme
source-file ~/.tmux.theme.conf
