gui:
  theme:
    activeBorderColor:
      - '#89b4fa'
      - bold
    inactiveBorderColor:
      - '#a6adc8'
    searchingActiveBorderColor:
      - '#f9e2af'
    optionsTextColor:
      - '#89b4fa'
    selectedLineBgColor:
      - '#313244'
    inactiveViewSelectedLineBgColor:
      - '#6c7086'
    cherryPickedCommitFgColor:
      - '#89b4fa'
    cherryPickedCommitBgColor:
      - '#45475a'
    markedBaseCommitFgColor:
      - '#89b4fa'
    markedBaseCommitBgColor:
      - '#f9e2af'
    unstagedChangesColor:
      - '#f38ba8'
    defaultFgColor:
      - '#cdd6f4'
  
  authorColors:
    '*': '#b4befe'

customCommands:
  - key: "P"
    context: "localBranches"
    description: "Pull origin/development into current branch without rebase"
    command: "git pull origin development --no-rebase"
    loadingText: "Pulling origin/development..."

  - key: "O"
    context: "localBranches"
    description: "Pull selected branch from origin into current branch without rebase"
    command: "git pull origin {{.SelectedLocalBranch.Name}} --no-rebase"
    loadingText: "Pulling selected branch..."
